stages:
  - build
  - test
  - deploy

variables:
  NPM_CONFIG_CACHE: .npm

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - when: never

.node_base:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
    - export NEXT_PUBLIC_CONTACT_API_URL="${NEXT_PUBLIC_CONTACT_API_URL:-$CONTACT_API_URL}"

.aws_oidc_base:
  image: amazon/aws-cli:latest
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - test -n "${ROLE_ARN}" || (echo "ROLE_ARN is required" && exit 1)
    - test -n "${AWS_DEFAULT_REGION}" || (echo "AWS_DEFAULT_REGION is required" && exit 1)
    - >-
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn ${ROLE_ARN}
      --role-session-name "gitlab-ci-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]"
      --output text))
    - aws sts get-caller-identity

build:
  extends: .node_base
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 day

test:
  extends: .node_base
  stage: test
  script:
    - npm run lint

deploy:
  extends: .aws_oidc_base
  stage: deploy
  needs:
    - job: build
      artifacts: true
    - job: test
  script:
    - test -n "${BUCKET_NAME}" || (echo "BUCKET_NAME is required" && exit 1)
    - test -n "${DISTRIBUTION_ID}" || (echo "DISTRIBUTION_ID is required" && exit 1)
    - aws s3 sync out/ s3://${BUCKET_NAME} --delete
    - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"
  environment:
    name: production
