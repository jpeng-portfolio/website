# Reusable quality gates: lint -> typecheck -> unit -> integration (e2e + Lambda).
# Called by both pr.yml and deploy.yml so the exact same gates run on PRs and on
# merge. Pure app gates call no AWS and assume no role.
name: gates

on:
  workflow_call: {}

env:
  NODE_VERSION: "22"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:unit

  e2e:
    # Integration: regenerate the résumé from site content, build the static
    # export, and drive it headlessly, fully offline.
    runs-on: ubuntu-latest
    env:
      # The build needs the public env at compile time. E2E doesn't touch the
      # real API, so a dummy URL and Cloudflare's documented test site key are
      # enough to produce a representative static export.
      NEXT_PUBLIC_CONTACT_API_URL: https://example.com/contact
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || '1x00000000000000000000AA' }}
      # The résumé portal fails loud without these; e2e doesn't reach Cognito, so
      # representative dummies are enough to produce the static export.
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_e2edummy
      NEXT_PUBLIC_COGNITO_CLIENT_ID: e2edummyclientid
      NEXT_PUBLIC_COGNITO_HOSTED_UI_DOMAIN: jp-resume.auth.us-east-1.amazoncognito.com
      NEXT_PUBLIC_COGNITO_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Regenerate the résumé documents from site content BEFORE next build, so
      # `out/resume/files/*` is published from the export. The contact header is
      # secret-sourced; PRs without the secret fall back to clearly-fake preview
      # details (the documents themselves never ship to prod from a PR).
      - name: Generate résumé documents (assert non-empty + deterministic)
        env:
          RESUME_CONTACT_JSON: ${{ secrets.RESUME_CONTACT_JSON || '{"fullName":"Resume Preview","email":"preview@example.com","phone":"+1 555 000 0000","location":"Remote"}' }}
        run: |
          PDF=public/resume/files/jason-paquette-resume.pdf
          DOCX=public/resume/files/jason-paquette-resume.docx

          npm run resume:build
          test -s "$PDF" || { echo "::error::résumé PDF missing or empty"; exit 1; }
          test -s "$DOCX" || { echo "::error::résumé DOCX missing or empty"; exit 1; }
          head -c 5 "$PDF" | grep -q '%PDF-' || { echo "::error::résumé PDF is not a valid PDF"; exit 1; }

          # Determinism: a rerun must be byte-identical (PDF) and content-identical
          # (DOCX body — docProps timestamps are package metadata, not content).
          PDF_1="$(sha256sum "$PDF" | awk '{print $1}')"
          BODY_1="$(unzip -p "$DOCX" word/document.xml | sha256sum | awk '{print $1}')"
          npm run resume:build
          PDF_2="$(sha256sum "$PDF" | awk '{print $1}')"
          BODY_2="$(unzip -p "$DOCX" word/document.xml | sha256sum | awk '{print $1}')"
          [ "$PDF_1" = "$PDF_2" ] || { echo "::error::résumé PDF generation is not deterministic"; exit 1; }
          [ "$BODY_1" = "$BODY_2" ] || { echo "::error::résumé DOCX content is not deterministic"; exit 1; }

      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  lambda:
    # Integration: contact Lambda handler logic + contract, offline (mock SES).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/lambdas/contact
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infrastructure/lambdas/contact
      - run: cargo test --locked

  edge-authorizer:
    # Unit: Lambda@Edge Cognito authorizer (allow / redirect / fail-loud config).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/lambdas/edge-authorizer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: infrastructure/lambdas/edge-authorizer/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build # ensure the bundle compiles (Pulumi packages it)
