# Reusable quality gates: lint -> typecheck -> unit -> integration (e2e + Lambda).
# Called by both pr.yml and deploy.yml so the exact same gates run on PRs and on
# merge. Pure app gates call no AWS and assume no role.
name: gates

on:
  workflow_call: {}

env:
  NODE_VERSION: "22"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:unit

  e2e:
    # Integration: build the static export and drive it headlessly, fully offline.
    runs-on: ubuntu-latest
    env:
      # The build needs the public env at compile time. E2E doesn't touch the
      # real API, so a dummy URL and Cloudflare's documented test site key are
      # enough to produce a representative static export.
      NEXT_PUBLIC_CONTACT_API_URL: https://example.com/contact
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || '1x00000000000000000000AA' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  resume:
    # Regenerate the résumé (PDF + DOCX) from site content and upload it as a
    # workflow artifact. The real contact block comes from the RESUME_CONTACT_JSON
    # secret when available; otherwise a placeholder keeps the gate green (e.g.
    # fork PRs that can't read secrets). Doc-generation failure fails CI (fail-loud)
    # — but a missing secret never fails it, so production deploys aren't blocked on
    # the secret being configured. The published artifact lives on the workflow run,
    # downloadable by the owner; it is never served from the public site.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Resolve résumé contact (secret or placeholder)
        env:
          SECRET_CONTACT: ${{ secrets.RESUME_CONTACT_JSON }}
        run: |
          if [ -n "$SECRET_CONTACT" ]; then
            {
              echo "RESUME_CONTACT_JSON<<__RESUME_EOF__"
              echo "$SECRET_CONTACT"
              echo "__RESUME_EOF__"
            } >> "$GITHUB_ENV"
          else
            echo 'RESUME_CONTACT_JSON={"fullName":"Example Candidate","email":"example@example.com","phone":"+1 (555) 555-0100","location":"Remote, US"}' >> "$GITHUB_ENV"
          fi
      - name: Generate résumé
        run: npm run resume:build
      - name: Assert both documents are valid and non-empty
        run: |
          pdf=dist/resume/jason-paquette-resume.pdf
          docx=dist/resume/jason-paquette-resume.docx
          test -s "$pdf" || { echo "::error::missing or empty $pdf"; exit 1; }
          test -s "$docx" || { echo "::error::missing or empty $docx"; exit 1; }
          # Magic-byte sanity: PDF starts with %PDF-, DOCX (zip) starts with PK.
          head -c 5 "$pdf" | grep -q '%PDF-' || { echo "::error::$pdf is not a valid PDF"; exit 1; }
          head -c 2 "$docx" | grep -q 'PK' || { echo "::error::$docx is not a valid DOCX"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: resume
          path: dist/resume/
          if-no-files-found: error

  lambda:
    # Integration: contact Lambda handler logic + contract, offline (mock SES).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/lambdas/contact
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infrastructure/lambdas/contact
      - run: cargo test --locked
