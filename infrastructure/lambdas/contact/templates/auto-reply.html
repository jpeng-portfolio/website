<!doctype html>
<html lang="en">
  <body style="font-family: Inter, Arial, sans-serif; color: #0F172A; background: #F5F0E8; padding: 24px;">
    <h2 style="margin: 0 0 16px;">Thanks for reaching out, {{name}}!</h2>
    <p>I have received your message about "<strong>{{subject}}</strong>" and will get back to you soon.</p>

    <p style="margin-top: 24px;">Best regards</p>
  </body>
</html>
