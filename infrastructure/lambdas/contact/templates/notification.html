<!doctype html>
<html lang="en">
  <body style="font-family: Inter, Arial, sans-serif; color: #0F172A; background: #F5F0E8; padding: 24px;">
    <h2 style="margin: 0 0 16px;">New contact form submission</h2>
    <table style="border-collapse: collapse;">
      <tr><td style="padding: 4px 12px 4px 0; font-weight: 600;">Name</td><td>{{name}}</td></tr>
      <tr><td style="padding: 4px 12px 4px 0; font-weight: 600;">Email</td><td>{{email}}</td></tr>
      <tr><td style="padding: 4px 12px 4px 0; font-weight: 600;">Subject</td><td>{{subject}}</td></tr>
    </table>
    <h3 style="margin: 16px 0 8px;">Message</h3>
    <p style="white-space: pre-wrap;">{{message}}</p>
  </body>
</html>
