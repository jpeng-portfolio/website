<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thanks for reaching out</title>
  </head>
  <body style="margin:0;background:#F5F0E8;font-family:Inter,Arial,sans-serif;color:#0F172A;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5F0E8;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e2ded5;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="background:#0F172A;color:#F5F0E8;padding:20px 28px;font-size:16px;font-weight:600;">
                Thanks for reaching out
              </td>
            </tr>
            <tr>
              <td style="padding:28px;font-size:14px;line-height:1.7;color:#334155;">
                <p style="margin:0 0 16px;">Hi {{name}},</p>
                <p style="margin:0 0 16px;">
                  Thanks for getting in touch — I've received your message and will get back to you
                  as soon as I can, usually within a day or two.
                </p>
                <p style="margin:0 0 8px;color:#64748b;font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.12em;">
                  Your message
                </p>
                <div style="padding:16px;background:#f8f4ed;border:1px solid #e2ded5;border-radius:12px;white-space:pre-wrap;">{{message}}</div>
                <p style="margin:20px 0 0;">Talk soon,<br />JP</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
