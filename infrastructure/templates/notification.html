<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New contact form submission</title>
  </head>
  <body style="margin:0;background:#F5F0E8;font-family:Inter,Arial,sans-serif;color:#0F172A;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5F0E8;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e2ded5;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="background:#0F172A;color:#F5F0E8;padding:20px 28px;font-size:16px;font-weight:600;">
                New contact form submission
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 16px;font-size:14px;color:#475569;">
                  You received a new message via the contact form.
                </p>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:14px;">
                  <tr>
                    <td style="padding:6px 0;width:90px;color:#64748b;font-family:'JetBrains Mono',monospace;">Name</td>
                    <td style="padding:6px 0;font-weight:600;">{{name}}</td>
                  </tr>
                  <tr>
                    <td style="padding:6px 0;color:#64748b;font-family:'JetBrains Mono',monospace;">Email</td>
                    <td style="padding:6px 0;font-weight:600;">{{email}}</td>
                  </tr>
                  <tr>
                    <td style="padding:6px 0;color:#64748b;font-family:'JetBrains Mono',monospace;">Subject</td>
                    <td style="padding:6px 0;font-weight:600;">{{subject}}</td>
                  </tr>
                </table>
                <div style="margin-top:20px;padding:16px;background:#f8f4ed;border:1px solid #e2ded5;border-radius:12px;white-space:pre-wrap;font-size:14px;line-height:1.6;">{{message}}</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
