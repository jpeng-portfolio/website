name: jpeng-portfolio-infra
runtime:
  name: nodejs
  options:
    packagemanager: npm
description: >-
  Static S3 + CloudFront hosting and the serverless contact API (API Gateway v2
  -> Rust Lambda -> SES) for the jpeng-portfolio website. Serverless-first,
  region-pinned to us-east-1 (CloudFront ACM requirement). State lives in Pulumi
  Cloud. DNS is managed via the Cloudflare provider.
config:
  # Region is pinned to us-east-1 because the CloudFront viewer certificate must
  # be issued by ACM in us-east-1.
  aws:region: us-east-1
